name: Scrape and find matching number

on:
  # Manual trigger only – no schedule, no push
  workflow_dispatch:
    inputs:
      birth_date:
        description: 'Birth date (DD-MM-YYYY)'
        required: true
        default: '1990-01-01'
      start_number:
        description: 'Start 8-digit number'
        required: true
        default: '11000000'
      end_number:
        description: 'End 8-digit number'
        required: true
        default: '11009999'
      success_indicator:
        description: 'Text that indicates a match (optional)'
        required: false
        default: 'Record found'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours – adjust as needed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          BASE_URL: ${{ https://bceceboard.bihar.gov.in/web_RankCard/BLE2026_RANK/BLE_Rank.php }}   # store in repo secrets
          BIRTH_DATE: ${{ github.event.inputs.birth_date }}
          START_NUMBER: ${{ github.event.inputs.start_number }}
          END_NUMBER: ${{ github.event.inputs.end_number }}
          SUCCESS_INDICATOR: ${{ github.event.inputs.success_indicator }}
          REQUEST_DELAY_MIN: '0.5'
          REQUEST_DELAY_MAX: '1.5'
        run: python scraper.py

      - name: Upload match result (if found)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: match-result
          path: match_result.txt
          if-no-files-found: ignore   # don't fail if no match
