name: Scrape and find matching number

on:
  # Manual trigger only – no schedule, no push
  workflow_dispatch:
    inputs:
      birth_day:
        description: 'Birth day (1–31)'
        required: true
        default: '1'
        type: string
      birth_month:
        description: 'Birth month (1–12)'
        required: true
        default: '1'
        type: string
      birth_year:
        description: 'Birth year (e.g. 1990)'
        required: true
        default: '1990'
        type: string
      start_number:
        description: 'Start 8‑digit number (e.g. 11006500)'
        required: true
        default: '11006500'
        type: string
      end_number:
        description: 'End 8‑digit number (e.g. 11006520)'
        required: true
        default: '11006520'
        type: string
      success_indicator:
        description: 'Text that indicates a match (e.g. "Record found")'
        required: false
        default: 'Record found'
        type: string
      debug:
        description: 'Enable debug mode (saves HTML of each request)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60          # adjust if you search large ranges

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          BIRTH_DAY: ${{ github.event.inputs.birth_day }}
          BIRTH_MONTH: ${{ github.event.inputs.birth_month }}
          BIRTH_YEAR: ${{ github.event.inputs.birth_year }}
          START_NUMBER: ${{ github.event.inputs.start_number }}
          END_NUMBER: ${{ github.event.inputs.end_number }}
          SUCCESS_INDICATOR: ${{ github.event.inputs.success_indicator }}
          DEBUG: ${{ github.event.inputs.debug }}
          # Concurrency tuning – change these if needed
          MAX_WORKERS: '5'
          DELAY_PER_REQUEST: '0.5'
        run: python scraper.py

      - name: Upload match result (if found)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: match-result
          path: match_result.txt
          if-no-files-found: ignore

      - name: Upload debug HTML files (if debug enabled)
        if: success() && github.event.inputs.debug == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_*.html
          if-no-files-found: ignore
